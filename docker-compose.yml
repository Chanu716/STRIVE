version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: strive
      POSTGRES_PASSWORD: strive
      POSTGRES_DB: strive
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strive -d strive"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
    environment:
      DATABASE_URL: postgresql+psycopg2://strive:strive@db:5432/strive
      PYTHONPATH: /app
      MODEL_PATH: /app/models/model.pkl
      FEATURE_CONFIG_PATH: /app/models/feature_config.json
      GRAPH_PATH: /app/data/raw/road_network.graphml
      OWM_API_KEY: ${OWM_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
