services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://strive:strive@db:5432/strive
      GRAPH_PATH: /app/data/raw/road_network.graphml
      MODEL_PATH: /app/models/model.pkl
      FEATURE_CONFIG_PATH: /app/models/feature_config.json
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./models:/app/models

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: strive
      POSTGRES_PASSWORD: strive
      POSTGRES_DB: strive
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strive -d strive"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
